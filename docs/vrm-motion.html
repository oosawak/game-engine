<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./vrm-editor.html" />
  <title>VRM Motion Detail</title>
</head>
<body>
  <p>VRM Motion Detail は VRM Editor に統合されました。<a href="./vrm-editor.html">VRM Editor を開く</a></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const motion = params.get("motion");
    const target = motion ? `./vrm-editor.html?motion=${encodeURIComponent(motion)}` : "./vrm-editor.html";
    window.location.replace(target);
  </script>
</body>
</html>
