<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mint Assets</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1016;
      --panel: #121824;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e7edf8;
      --muted: #8f9bb0;
      --accent: #6cc1ff;
      --accent-2: #7cf0b7;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --font: "Avenir Next", "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(108, 193, 255, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(124, 240, 183, 0.09), transparent 30%),
        linear-gradient(180deg, #0b0e14 0%, #101421 100%);
      color: var(--text);
      font-family: var(--font);
    }

    body { padding: 24px; }

    .shell {
      width: min(1280px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)), var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      gap: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(108, 193, 255, 0.12);
      border: 1px solid rgba(108, 193, 255, 0.24);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    h1, h2, p { margin: 0; }
    h1 { font-size: 28px; }
    p { color: var(--muted); line-height: 1.7; }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
    }

    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      text-align: left;
      vertical-align: top;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
      line-height: 1.6;
    }

    th {
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    td { color: var(--muted); }

    code {
      color: #dbe6ff;
      background: rgba(108, 193, 255, 0.08);
      border: 1px solid rgba(108, 193, 255, 0.12);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      font-size: 12px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="badge"><span class="dot"></span> Mint Integration</div>
    <h1>Mint MCP × Three.js</h1>
    <p>Mint MCP で生成したアセットを、`mint-threejs-skills` 経由で Three.js 側に取り込む確認ページです。</p>
    <section class="summary" id="summary"></section>
    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Kind</th>
            <th>Source</th>
            <th>Alias / Script</th>
            <th>Tags</th>
            <th>Meta</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script type="module">
    const manifest = await fetch("./mint-assets.json").then((response) => response.json());
    const assets = Array.isArray(manifest.assets) ? manifest.assets : [];
    const summary = document.getElementById("summary");
    const rows = document.getElementById("rows");

    summary.innerHTML = [
      { value: manifest.provider ?? "Mint MCP", label: "Provider" },
      { value: manifest.client ?? "mint-threejs-skills", label: "Client" },
      { value: String(assets.length), label: "Assets" },
    ].map(({ value, label }) => `
      <div class="stat">
        <strong>${escapeHtml(value)}</strong>
        <span>${escapeHtml(label)}</span>
      </div>
    `).join("");

    rows.innerHTML = assets.map((asset) => `
      <tr>
        <td><code>${escapeHtml(asset.id)}</code></td>
        <td>${escapeHtml(asset.kind)}</td>
        <td>${escapeHtml(asset.source)}</td>
        <td>
          <div class="pill-row">${formatList(asset.alias)}</div>
          <div style="margin-top:8px;"><code>${escapeHtml(asset.scriptName || asset.id)}</code></div>
        </td>
        <td><div class="pill-row">${formatList(asset.tags)}</div></td>
        <td><pre style="margin:0;white-space:pre-wrap;">${escapeHtml(JSON.stringify(asset.meta ?? {}, null, 2))}</pre></td>
      </tr>
    `).join("");

    function formatList(values) {
      if (!Array.isArray(values) || values.length === 0) {
        return `<span style="color: var(--muted);">-</span>`;
      }
      return values.map((value) => `<span class="pill">${escapeHtml(String(value))}</span>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
